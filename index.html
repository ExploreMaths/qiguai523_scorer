<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七怪五二三 计分器</title>
    <script>
        (function () {
            var ua = navigator.userAgent || navigator.vendor || "";
            var isIPad =
                /ipad/i.test(ua) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var isAndroid = /android/i.test(ua);
            var isAndroidPhone = isAndroid && /mobile/i.test(ua);
            var isAndroidTablet = isAndroid && !/mobile/i.test(ua);
            var isPhone =
                /iphone|ipod|webos|blackberry|iemobile|opera mini/i.test(ua) ||
                isAndroidPhone;
            var isTablet = isIPad || isAndroidTablet || /tablet/i.test(ua);
            var root = document.documentElement;
            if (isPhone) root.classList.add("is-phone");
            if (isTablet) root.classList.add("is-tablet");
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 设置玩家 -->
        <div id="setup-view" class="view active">
            <div class="card setup-card">
                <h1>设置玩家</h1>
                <p class="hint">每名玩家一行，可点击右侧 <i class="fa-solid fa-trash-can"></i> 删除</p>

                <div class="preset-section">
                    <div class="preset-title">固定组合</div>
                    <div class="preset-list" id="preset-list"></div>
                    <div class="preset-add">
                        <input type="text" id="preset-name" placeholder="组合名称">
                        <button class="btn btn-outline" onclick="saveCurrentAsPreset()">保存当前为组合</button>
                    </div>
                </div>

                <div id="player-list" class="player-list"></div>
                <button class="btn btn-outline btn-add" onclick="addPlayerInput()">＋ 添加玩家</button>
                <button class="btn btn-primary" onclick="startGame()">开始计分</button>
            </div>
        </div>

        <!-- 主计分界面 -->
        <div id="game-view" class="view">
            <header class="app-header">
                <div class="header-left">
                    <h1>七怪五二三 计分器</h1>
                    <span id="round-total" class="total-status ok">本局分数正确</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-sm btn-outline" onclick="openSetup()">设置玩家</button>
                    <button class="btn btn-sm btn-danger-outline" onclick="deleteCurrentRound()">删除该局</button>
                    <div class="round-badge" id="round-badge">第 1 局 / 共 1 局</div>
                </div>
            </header>

            <div class="card score-card">
                <div class="score-table" id="score-table"></div>

                <div class="bomb-section">
                    <div class="bomb-buttons">
                        <button class="btn btn-bomb" onclick="addBomb(2)">＋3张 ×2</button>
                        <button class="btn btn-bomb" onclick="addBomb(4)">＋4张 ×4</button>
                        <button class="btn btn-bomb" onclick="addBomb(8)">＋5张 ×8</button>
                        <button class="btn btn-bomb" onclick="addBomb(16)">＋6张 ×16</button>
                        <button class="btn btn-bomb" onclick="addBomb(32)">＋7张 ×32</button>
                    </div>
                </div>
            </div>

            <div class="card actions-card">
                <div class="nav-actions">
                    <button class="btn btn-outline" id="prev-btn" onclick="prevRound()">← 上一局</button>
                    <button class="btn btn-outline" id="next-btn" onclick="nextRound()">下一局 →</button>
                </div>
                <button class="btn btn-primary" onclick="showSummary()">完成并查看完整表格</button>
            </div>
        </div>

        <!-- 汇总表 -->
        <div id="summary-view" class="view">
            <header class="app-header">
                <h1>完整计分表</h1>
            </header>
            <div class="card summary-card">
                <div id="summary-table"></div>
            </div>
            <div class="card actions-card">
                <button class="btn btn-outline" onclick="backToGame()">返回计分</button>
                <button class="btn btn-primary" onclick="exportExcel()">
                    <i class="fa-solid fa-file-excel"></i> 导出 Excel
                </button>
                <button class="btn btn-primary" onclick="exportImage()">
                    <i class="fa-solid fa-image"></i> 导出图片
                </button>
                <button class="btn btn-danger-outline" onclick="restartGame()">重新开始</button>
            </div>
        </div>
    </div>

    <!-- 手机端提示 -->
    <div class="mobile-block">
        <div class="mobile-block-card">
            <h1>请在电脑或平板上使用</h1>
            <p>本计分器暂未适配手机端，请前往电脑端，或使用平板并切换到横屏。</p>
        </div>
    </div>

    <!-- 平板竖屏提示 -->
    <div class="rotate-block">
        <div class="mobile-block-card">
            <h1>请切换到横屏</h1>
            <p>平板在横屏下使用体验更佳，请将设备旋转至横屏。</p>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-message" id="modal-message"></div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <!-- 组合编辑器 -->
    <div id="editor-overlay" class="modal-overlay" style="display:none;">
        <div class="modal editor-modal">
            <h2 class="editor-title" id="editor-title">编辑组合</h2>
            <div class="player-list" id="editor-player-list"></div>
            <button class="btn btn-outline btn-add" onclick="editorAddPlayer()">＋ 添加玩家</button>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeEditor()">取消</button>
                <button class="btn btn-primary" onclick="saveEditor()">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
